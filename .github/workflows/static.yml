name: Deploy from Release

on:
  # Run when this repository is created or manually triggered
  workflow_dispatch:
  # Run on a schedule to check for new releases (every 6 hours at :00)
  schedule:
    - cron: '0 */6 * * *'
  # Can also be triggered by repository_dispatch from the source repo
  repository_dispatch:
    types: [new-release]

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: fvandepitte-blogs
          repositories: .github
        
      - name: Get latest release from source repo
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/fvandepitte-blogs/.github/releases/latest"
          echo "Fetching latest release from: $API_URL"

          LATEST_RELEASE="$(curl -sS -L -H "Authorization: token $GH_TOKEN" "$API_URL")"

          TAG_NAME="$(echo "$LATEST_RELEASE" | jq -r '.tag_name // empty')"
          RELEASE_NAME="$(echo "$LATEST_RELEASE" | jq -r '.name // empty')"
          HTML_URL="$(echo "$LATEST_RELEASE" | jq -r '.html_url // empty')"

          echo "Latest release tag:  $TAG_NAME"
          echo "Latest release name: $RELEASE_NAME"
          echo "Latest release url:  $HTML_URL"

          echo "Assets in latest release:"
          echo "$LATEST_RELEASE" | jq -r '.assets[]? | " - \(.name) (\(.size) bytes) id=\(.id)"'

          DOWNLOAD_URL="$(echo "$LATEST_RELEASE" | jq -r '.assets[]? | select(.name == "blogsite-dist.tar.gz") | .url // empty')"

          if [[ -z "$DOWNLOAD_URL" ]]; then
            echo "No downloadable asset named blogsite-dist.tar.gz found in latest release"
            exit 1
          fi

          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"          
      - name: Download and extract release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -L -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" -o blogsite-dist.tar.gz "${{ steps.release.outputs.download_url }}"
          echo "Downloaded $(stat --format=%s blogsite-dist.tar.gz 2>/dev/null || stat -f%z blogsite-dist.tar.gz) bytes"
          mkdir -p dist
          tar -xzf blogsite-dist.tar.gz -C dist
          rm blogsite-dist.tar.gz
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
