name: Deploy Blog Site

on:
  # Triggered by repository_dispatch from fvandepitte-blogs/.github
  repository_dispatch:
    types: [deploy-blog]
  # Allow manual deployments from the Actions tab
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (leave empty for latest)'
        required: false
        type: string

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: .github

      - name: Set deployment variables
        id: vars
        run: |
          echo "deployment_id=${{ github.event.client_payload.deployment_id }}" >> $GITHUB_OUTPUT
          echo "source_repo=${{ github.event.client_payload.source_repo || 'fvandepitte-blogs/.github' }}" >> $GITHUB_OUTPUT
          echo "release_tag=${{ github.event.client_payload.release_tag || inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Update deployment status — in_progress
        if: steps.vars.outputs.deployment_id != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.vars.outputs.deployment_id }}
          SOURCE_REPO: ${{ steps.vars.outputs.source_repo }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = process.env.SOURCE_REPO.split('/');
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: parseInt(process.env.DEPLOYMENT_ID),
              state: 'in_progress',
              description: 'Deployment started'
            });

      - name: Get release download URL
        id: release
        run: |
          SOURCE_REPO="${{ steps.vars.outputs.source_repo }}"
          RELEASE_TAG="${{ steps.vars.outputs.release_tag }}"

          if [ -n "$RELEASE_TAG" ]; then
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${SOURCE_REPO}/releases/tags/${RELEASE_TAG}")
          else
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${SOURCE_REPO}/releases/latest")
          fi

          ASSET_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "blogsite-dist.tar.gz") | .url')
          echo "download_url=$ASSET_URL" >> $GITHUB_OUTPUT

      - name: Download and extract release artifact
        run: |
          curl -sfL \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/octet-stream" \
            -o blogsite-dist.tar.gz \
            "${{ steps.release.outputs.download_url }}"
          mkdir -p dist
          tar -xzf blogsite-dist.tar.gz -C dist
          rm blogsite-dist.tar.gz

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Update deployment status — success
        if: success() && steps.vars.outputs.deployment_id != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.vars.outputs.deployment_id }}
          SOURCE_REPO: ${{ steps.vars.outputs.source_repo }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = process.env.SOURCE_REPO.split('/');
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: parseInt(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment_url: 'https://fvandepitte-blog.github.io',
              description: 'Deployment completed successfully'
            });

      - name: Update deployment status — failure
        if: failure() && steps.vars.outputs.deployment_id != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.vars.outputs.deployment_id }}
          SOURCE_REPO: ${{ steps.vars.outputs.source_repo }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = process.env.SOURCE_REPO.split('/');
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: parseInt(process.env.DEPLOYMENT_ID),
              state: 'failure',
              description: 'Deployment failed — check workflow logs'
            });
