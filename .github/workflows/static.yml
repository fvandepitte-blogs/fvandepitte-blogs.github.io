name: Deploy from Release

on:
  # Run when this repository is created or manually triggered
  workflow_dispatch:
  # Run on a schedule to check for new releases (every 6 hours at :00)
  schedule:
    - cron: '0 */6 * * *'
  # Can also be triggered by repository_dispatch from the source repo
  repository_dispatch:
    types: [new-release]

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Get latest release from source repo
        id: release
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/fvandepitte-blogs/.github/releases/latest)
          DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[]? | select(.name == "blogsite-dist.tar.gz") | .browser_download_url // empty')
          TAG_NAME=$(echo "$LATEST_RELEASE" | jq -r '.tag_name // empty')
          if [[ -z "$DOWNLOAD_URL" ]]; then
            echo "No downloadable asset named blogsite-dist.tar.gz found in latest release"
            exit 1
          fi
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
      - name: Download and extract release
        run: |
          curl -L -o blogsite-dist.tar.gz "${{ steps.release.outputs.download_url }}"
          mkdir -p dist
          tar -xzf blogsite-dist.tar.gz -C dist
          rm blogsite-dist.tar.gz
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
